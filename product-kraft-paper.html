                    <img src="https://images.unsplash.com/photo-1577412647953-fc3ee12eaf0f?w=600" alt="Kraft Paper">

                    <div class="pricing-factors">
                        <h3 data-uk="Чинники ціноутворення:" data-en="Pricing Factors:" data-pl="Czynniki ceny:"></h3>
                        <ul>
                            <li data-uk="Ширина рулону (600-1200мм)" data-en="Roll width (600-1200mm)" data-pl="Szerokość rolki (600-1200mm)"></li>
                            <li data-uk="Грамаж паперу (70-150 г/м²)" data-en="Paper weight (70-150 g/m²)" data-pl="Waga papieru (70-150 g/m²)"></li>
                            <li data-uk="Довжина рулону" data-en="Roll length" data-pl="Długość rolki"></li>
                            <li data-uk="Виче білова версія або коричнева" data-en="White or brown version" data-pl="Wersja biała lub brązowa"></li>
                            <li data-uk="Мінімальний обсяг замовлення" data-en="Minimum order quantity" data-pl="Minimalna ilość zamówienia"></li>

                        </ul>
                    </div>

                    <div class="examples">
                        <h3 data-uk="Приклади реальних замовлень:" data-en="Real Order Examples:" data-pl="Przykłady rzeczywistych zamówień:"></h3>
                        <div class="example-item">
                            <p><strong data-uk="Замовлення #1:" data-en="Order #1:" data-pl="Zamówienie #1:"></strong> 
                               <span data-uk="5 рулонів, ширина 800мм, грамаж 90 г/м²" data-en="5 rolls, width 800mm, weight 90 g/m²" data-pl="5 rolek, szerokość 800mm, waga 90 g/m²"></span></p>
                            <p data-uk="Вартість: 250 грн за рулон" data-en="Cost: 250 UAH per roll" data-pl="Koszt: 250 UAH za rolkę"></p>
                        </div>
                        <div class="example-item">
                            <p><strong data-uk="Замовлення #2:" data-en="Order #2:" data-pl="Zamówienie #2:"></strong>

                            <li><i class="fas fa-check"></i> <span data-uk="100% натуральний матеріал" data-en="100% natural material" data-pl="100% materiał naturalny"></span></li>
