                <i class="fas fa-bars"></i>

            <div class="language-selector">
                <button onclick="switchLanguage('uk')" class="lang-btn active">УК</button>

    <main class="container">
        <section class="product-detail">
            <div class="breadcrumb">
                <a href="index.html" data-uk="Головна" data-en="Home" data-pl="Strona główna"></a> / 
                <a href="products.html" data-uk="Продукти" data-en="Products" data-pl="Produkty"></a> / 
                <span data-uk="Упаковувальна плівка" data-en="Packaging Film" data-pl="Folia pakunkowa"></span>
            </div>

            <div class="product-header">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1631781754181-e9e0a8e82b9b?w=600" alt="Packaging Film">
                </div>
                <div class="product-info">
                    <h1 data-uk="Упаковувальна плівка" data-en="Packaging Film" data-pl="Folia pakunkowa"></h1>
                    <p class="product-description" data-uk="Міцна та водостійка упаковувальна плівка для надійного захисту всіх видів товарів. Ідеальна для стрічування палет та упаковки об'ємних предметів." data-en="Strong and water-resistant packaging film for reliable protection of all types of goods. Perfect for pallet strapping and wrapping bulky items." data-pl="Mocna i wodoodporna folia pakunkowa do niezawodnej ochrony wszystkich rodzajów towarów. Idealna do okręcania palet i opakowywania dużych przedmiotów."></p>
                    
                    <div class="pricing-factors">
                        <h3 data-uk="Чинники ціноутворення:" data-en="Pricing Factors:" data-pl="Czynniki ceny:"></h3>
                        <ul>
                            <li data-uk="Ширина рулону (450-1500 мм)" data-en="Roll width (450-1500 mm)" data-pl="Szerokość rolki (450-1500 mm)"></li>
                            <li data-uk="Товщина плівки (12-35 мкм)" data-en="Film thickness (12-35 μm)" data-pl="Grubość folii (12-35 μm)"></li>
                            <li data-uk="Довжина рулону (150-500 м)" data-en="Roll length (150-500 m)" data-pl="Długość rolki (150-500 m)"></li>
                            <li data-uk="Тип плівки (ПЕ або ПЕТ)" data-en="Film type (PE or PET)" data-pl="Rodzaj folii (PE lub PET)"></li>
                            <li data-uk="Колір (прозорий, чорний, білий)" data-en="Color (clear, black, white)" data-pl="Kolor (przezroczysty, czarny, biały)"></li>
                            <li data-uk="Кількість рулонів" data-en="Number of rolls" data-pl="Liczba rolek"></li>
                        </ul>
                    </div>

                    <div class="examples">
                        <h3 data-uk="Приклади реальних замовлень:" data-en="Real Order Examples:" data-pl="Przykłady rzeczywistych zamówień:"></h3>
                        <div class="example-item">
                            <p><strong data-uk="Замовлення #1:" data-en="Order #1:" data-pl="Zamówienie #1:"></strong> 
                               <span data-uk="5 рулонів, ширина 1000 мм, товщина 25 мкм, довжина 250 м" data-en="5 rolls, width 1000 mm, thickness 25 μm, length 250 m" data-pl="5 rolek, szerokość 1000 mm, grubość 25 μm, długość 250 m"></span></p>
                            <p data-uk="Вартість: 380 грн за рулон" data-en="Cost: 380 UAH per roll" data-pl="Koszt: 380 UAH za rolkę"></p>
                        </div>
                        <div class="example-item">
                            <p><strong data-uk="Замовлення #2:" data-en="Order #2:" data-pl="Zamówienie #2:"></strong> 
                               <span data-uk="20 рулонів, ширина 1500 мм, товщина 30 мкм, довжина 350 м" data-en="20 rolls, width 1500 mm, thickness 30 μm, length 350 m" data-pl="20 rolek, szerokość 1500 mm, grubość 30 μm, długość 350 m"></span></p>
                            <p data-uk="Вартість: 540 грн за рулон" data-en="Cost: 540 UAH per roll" data-pl="Koszt: 540 UAH za rolkę"></p>
                        </div>
                    </div>

                    <div class="order-section">
                        <h3 data-uk="Особливості:" data-en="Features:" data-pl="Cechy:"></h3>
                        <ul>
                            <li><i class="fas fa-check"></i> <span data-uk="Вищого ступеня прозорості" data-en="High transparency level" data-pl="Wysoki poziom przezroczystości"></span></li>
                            <li><i class="fas fa-check"></i> <span data-uk="Відмінна адгезія до поверхні" data-en="Excellent surface adhesion" data-pl="Doskonała przyczepność do powierzchni"></span></li>
                            <li><i class="fas fa-check"></i> <span data-uk="Легко розгортається вручну" data-en="Easy to unroll by hand" data-pl="Łatwe do ręcznego rozwiązywania"></span></li>
                            <li><i class="fas fa-check"></i> <span data-uk="Універсальна для морозилки" data-en="Freezer-universal" data-pl="Uniwersalne do zamrażarki"></span></li>
                        </ul>
                    </div>

                    <a href="contact.html" class="cta-button"><i class="fas fa-envelope"></i> <span data-uk="Зв'язатися для замовлення" data-en="Contact to Order" data-pl="Skontaktuj się, aby zamówić"></span></a>
